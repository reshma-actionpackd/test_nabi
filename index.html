<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="calculator" aria-label="Basic calculator">
      <p class="calculator__mascot" aria-hidden="true">🐼</p>
      <output
        id="display"
        class="display"
        for="keys"
        aria-live="polite"
        aria-atomic="true"
      >0</output>

      <div id="keys" class="keys" role="group" aria-label="Calculator keys">
        <button type="button" class="key key--function key--span-4" data-action="sqrt" aria-label="square root">√</button>
        <button type="button" class="key key--function" data-action="clear" aria-label="clear">C</button>
        <button type="button" class="key key--function" data-action="sign" aria-label="toggle sign">±</button>
        <button type="button" class="key key--function" data-action="percent" aria-label="percent">%</button>
        <button type="button" class="key key--operator" data-action="operator" data-value="/" aria-label="divide">÷</button>

        <button type="button" class="key" data-action="digit" data-value="7">7</button>
        <button type="button" class="key" data-action="digit" data-value="8">8</button>
        <button type="button" class="key" data-action="digit" data-value="9">9</button>
        <button type="button" class="key key--operator" data-action="operator" data-value="*" aria-label="multiply">×</button>

        <button type="button" class="key" data-action="digit" data-value="4">4</button>
        <button type="button" class="key" data-action="digit" data-value="5">5</button>
        <button type="button" class="key" data-action="digit" data-value="6">6</button>
        <button type="button" class="key key--operator" data-action="operator" data-value="-" aria-label="subtract">−</button>

        <button type="button" class="key" data-action="digit" data-value="1">1</button>
        <button type="button" class="key" data-action="digit" data-value="2">2</button>
        <button type="button" class="key" data-action="digit" data-value="3">3</button>
        <button type="button" class="key key--operator" data-action="operator" data-value="+" aria-label="add">+</button>

        <button type="button" class="key key--zero" data-action="digit" data-value="0">0</button>
        <button type="button" class="key" data-action="decimal" aria-label="decimal point">.</button>
        <button type="button" class="key key--equals" data-action="equals" aria-label="equals">=</button>
      </div>
    </main>

    <script src="calculator.js"></script>
  </body>
</html>
